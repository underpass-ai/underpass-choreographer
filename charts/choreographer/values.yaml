replicaCount: 1

image:
  repository: ghcr.io/underpass-ai/underpass-choreographer
  pullPolicy: IfNotPresent
  # One of `tag` or `digest` MUST be set. There is no default: mutable
  # `:latest` pulls are refused in production to keep releases reproducible.
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  # The binary does not call the Kubernetes API, so mounting the
  # service-account token inside the pod is gratuitous attack
  # surface. Turn it back on only if a future adapter legitimately
  # needs in-cluster credentials.
  automountServiceAccountToken: false

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  # gRPC is the product surface; HTTP carries only health endpoints
  # (and, eventually, metrics). Both land on a single Service with
  # two named ports so probes can hit HTTP without any DNS games.
  port: 50055
  httpPort: 8080
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 512Mi

probes:
  liveness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Runtime configuration
# ---------------------------------------------------------------------------
#
# The Choreographer is provider-agnostic. None of these fields select a
# specific LLM vendor; agent providers are configured by the deployment
# (e.g. via secret-mounted config files or additional env vars) and plug in
# through the `AgentPort` trait.
config:
  grpcPort: 50055
  # The service exposes HTTP on a separate port for health probes
  # and future metrics. Kept small, plaintext, cluster-internal.
  httpPort: 8080
  logLevel: info
  # Optional startup seeding. Comma-separated list of specialty
  # labels: for each one the binary registers a deterministic
  # `NoopAgent` and a single-agent council, so the service is
  # immediately exercisable end-to-end. Off by default — real
  # deployments register agents through other channels.
  seedSpecialties: ""

messaging:
  nats:
    enabled: true
    url: nats://nats:4222
    # Subject prefix used for Choreographer-published events.
    publishPrefix: choreo
    # Wildcard of inbound trigger subjects consumed by the service.
    triggerSubject: choreo.trigger.>

# Persistent storage for deliberations, councils, agents, and
# statistics. When `enabled: true`, every registry that has a
# Postgres adapter goes through it atomically; migrations apply on
# startup.
persistence:
  postgres:
    enabled: false
    # One of the two URL sources below must be set when enabled.
    # Secret-by-reference is strongly preferred in production so
    # the DSN (and the embedded password) never land in the
    # Deployment spec or in Helm value files.
    url: ""
    urlFromSecret:
      name: ""
      key: ""

tls:
  # Transport security mode for the gRPC service.
  # One of: "none" | "server" | "mutual".
  mode: none
  existingSecret: ""

# PodDisruptionBudget. Only meaningful for multi-replica deployments;
# off by default (single-replica is the chart's default posture).
pdb:
  enabled: false
  # Either `minAvailable` or `maxUnavailable` — the template only
  # emits a block when both this value is set and `pdb.enabled`.
  minAvailable: 1
  # maxUnavailable: ""

# NetworkPolicy. Restricts both ingress (only declared ports) and
# egress (DNS + NATS + Postgres + OTLP by default). Off by default
# so the chart installs on clusters without a NetworkPolicy CNI;
# production deployments should flip this to true.
networkPolicy:
  enabled: false
  # Who can reach the pod. Must be a non-empty list in production —
  # an empty list combined with a podSelector-only ingress rule
  # would allow every pod in the namespace. Example:
  #
  #   ingressFrom:
  #     - namespaceSelector:
  #         matchLabels:
  #           role: client
  #     - podSelector:
  #         matchLabels:
  #           app.kubernetes.io/name: caller
  ingressFrom: []
  egress:
    # Pre-wired egress blocks for the dependencies the binary
    # actually talks to. Each entry is a single NetworkPolicy
    # peer (`to`) + ports group; set it to `~` (null) to drop
    # that block when the dependency lives outside the cluster
    # and egress is permitted elsewhere.
    nats:
      to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - port: 4222
          protocol: TCP
    postgres:
      to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgres
      ports:
        - port: 5432
          protocol: TCP
    otlp:
      to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: otel-collector
      ports:
        - port: 4317
          protocol: TCP
    # Any extra rules operators want to append (e.g. vLLM endpoint,
    # Anthropic/OpenAI via an egress proxy). Full NetworkPolicy
    # rule shape.
    extra: []

# Read-only root filesystem is enforced via securityContext, but
# libraries reach for /tmp occasionally. Mount an in-memory emptyDir
# so those writes succeed without loosening the FS permissions.
tmpVolume:
  enabled: true
  sizeLimit: 64Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

development:
  # Setting `image.tag` to a mutable reference (e.g. "latest") is rejected
  # unless explicitly allowed in a non-production environment.
  allowMutableImageTags: false
