apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "choreographer.fullname" . }}
  labels:
    {{- include "choreographer.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "choreographer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "choreographer.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "choreographer.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: choreo
          image: {{ include "choreographer.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: grpc
              containerPort: {{ .Values.config.grpcPort }}
              protocol: TCP
          env:
            - name: CHOREO_GRPC_PORT
              value: {{ .Values.config.grpcPort | quote }}
            - name: RUST_LOG
              value: {{ .Values.config.logLevel | quote }}
            {{- if .Values.messaging.nats.enabled }}
            - name: CHOREO_NATS_ENABLED
              value: "true"
            - name: CHOREO_NATS_URL
              value: {{ .Values.messaging.nats.url | quote }}
            - name: CHOREO_TRIGGER_SUBJECT
              value: {{ .Values.messaging.nats.triggerSubject | quote }}
            - name: CHOREO_PUBLISH_PREFIX
              value: {{ .Values.messaging.nats.publishPrefix | quote }}
            {{- else }}
            - name: CHOREO_NATS_ENABLED
              value: "false"
            {{- end }}
            {{- if .Values.config.seedSpecialties }}
            - name: CHOREO_SEED_SPECIALTIES
              value: {{ .Values.config.seedSpecialties | quote }}
            {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
