apiVersion: v1
kind: Service
metadata:
  name: {{ include "choreographer.fullname" . }}
  labels:
    {{- include "choreographer.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
      appProtocol: grpc
  selector:
    {{- include "choreographer.selectorLabels" . | nindent 4 }}
