name: e2e

# E2E runs on demand only. The per-PR fast-feedback gates
# (clippy, test, contract, integration-nats, integration-postgres,
# container-image, helm-chart) already cover the compile-and-unit
# surface; full E2E (docker compose + kind) is expensive and kept
# as a manual check before cutting a release. Trigger from the
# Actions tab or via `gh workflow run e2e.yml`.
on:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------
  # docker-compose-based E2E: fastest feedback loop. The full stack
  # (Choreographer + NATS + fake agent) is brought up with compose and a
  # runner container drives the scenarios over the gRPC contract.
  # --------------------------------------------------------------------
  e2e-compose:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Verify Docker / Compose
        run: |
          docker version
          docker compose version

      - name: Run E2E (docker compose)
        run: bash scripts/ci/e2e-compose.sh

  # --------------------------------------------------------------------
  # Kubernetes-in-a-job E2E: validates the Helm chart against a real
  # cluster (kind) with the runner executing as a Kubernetes Job. This
  # is the contract-true path used in production-like validation.
  # --------------------------------------------------------------------
  e2e-kubernetes:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create kind cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3
        with:
          cluster_name: choreographer-e2e

      - name: Install Helm
        run: bash scripts/ci/install-helm.sh

      - name: Run E2E (kubernetes job)
        run: bash scripts/ci/e2e-kubernetes.sh
