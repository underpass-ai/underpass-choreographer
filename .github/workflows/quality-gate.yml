name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Install buf
        run: bash scripts/ci/install-buf.sh

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Install AsyncAPI CLI
        run: bash scripts/ci/install-asyncapi.sh

      - name: Run contract gate
        run: bash scripts/ci/contract-gate.sh

  rustfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [contract]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: clippy
      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [contract]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh
      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Run tests
        run: cargo test --workspace --locked

  container-image:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs: [rustfmt, clippy, test]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Verify Docker
        run: docker version
      - name: Build container image
        run: bash scripts/ci/container-image.sh

  helm-chart:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [contract]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Install Helm
        run: bash scripts/ci/install-helm.sh
      - name: Lint Helm chart
        run: bash scripts/ci/helm-lint.sh

  sonarcloud:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs:
      - rustfmt
      - clippy
      - test
      - container-image
      - helm-chart
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      PR_FROM_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - name: Evaluate Sonar configuration
        id: sonar-config
        shell: bash
        run: |
          enabled=true
          reason=""
          if [ -z "${SONAR_TOKEN}" ]; then
            enabled=false
            reason="SONAR_TOKEN secret is not configured"
          elif [ "${PR_FROM_FORK}" = "true" ]; then
            enabled=false
            reason="SonarCloud scan is disabled for forked pull requests"
          fi
          echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
      - name: Skip SonarCloud
        if: steps.sonar-config.outputs.enabled != 'true'
        run: echo "::notice::Skipping SonarCloud. ${{ steps.sonar-config.outputs.reason }}"
      - name: Install Rust toolchain
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: llvm-tools-preview
      - name: Install protoc
        if: steps.sonar-config.outputs.enabled == 'true'
        run: bash scripts/ci/install-protoc.sh
      - name: Install cargo-llvm-cov
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: taiki-e/install-action@b81531fd070ace482ba6b315eb6c35611e1c37d3
        with:
          tool: cargo-llvm-cov
      - name: Cache Rust build artifacts
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
      - name: Cache Sonar packages
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar
      - name: Generate Rust coverage
        if: steps.sonar-config.outputs.enabled == 'true'
        run: bash scripts/ci/rust-coverage.sh
      - name: SonarCloud scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ github.workspace }}
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
